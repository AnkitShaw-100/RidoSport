<title>Thank You — Rido Sports</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:#F5F2EC;
  color:#1A1A1A;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
  -webkit-font-smoothing:antialiased;
}

.ty-wrap{
  text-align:center;
  max-width:560px;
  width:100%;
}

.ty-check{
  width:72px;
  height:72px;
  margin:0 auto 32px;
  background:#b8000c;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 14px 36px -10px rgba(184,0,12,.45);
  animation:pop .5s cubic-bezier(.2,.9,.3,1.4) .1s both;
}
.ty-check svg{
  width:30px;
  height:30px;
  stroke:#fff;
  fill:none;
  stroke-width:3;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:30;
  stroke-dashoffset:30;
  animation:draw .5s ease-out .5s forwards;
}
@keyframes pop{
  0%{transform:scale(0);opacity:0}
  100%{transform:scale(1);opacity:1}
}
@keyframes draw{
  to{stroke-dashoffset:0}
}

h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(60px,10vw,110px);
  font-weight:400;
  line-height:.95;
  letter-spacing:.005em;
  text-transform:uppercase;
  margin-bottom:14px;
  opacity:0;
  animation:fade .6s ease .7s forwards;
}
h1 em{
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-weight:500;
  color:#b8000c;
  text-transform:none;
  font-size:.8em;
}

p{
  font-size:15px;
  color:#4A4A4A;
  line-height:1.7;
  max-width:420px;
  margin:0 auto 36px;
  opacity:0;
  animation:fade .6s ease .9s forwards;
}

.back-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:#b8000c;
  color:#fff;
  border:none;
  padding:14px 32px;
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  font-weight:600;
  border-radius:6px;
  text-decoration:none;
  letter-spacing:.04em;
  text-transform:uppercase;
  transition:background .2s;
  opacity:0;
  animation:fade .6s ease 1.1s forwards;
}
.back-btn:hover{background:#8f0000}

@keyframes fade{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:none}
}
</style>
</head>
<body>

<div class="ty-wrap">

  </div>
  <h1>Thank <em>you.</em></h1>
  <p>Your enquiry has been received. Our team will get in touch with you within 1 business day.</p>
  <a href="/" class="back-btn">
    Back to Home
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
  </a>
</div>
